<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error — TG Media Downloader</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 40px; max-width: 500px; text-align: center;
  }
  .icon { font-size: 3rem; margin-bottom: 16px; }
  h2 { color: #f85149; margin-bottom: 12px; }
  p { color: #8b949e; line-height: 1.6; }
  .btn {
    display: inline-block; margin-top: 20px; padding: 10px 24px;
    border-radius: 6px; background: #21262d; border: 1px solid #30363d;
    color: #c9d1d9; text-decoration: none; font-size: 0.9rem;
  }
  .btn:hover { background: #30363d; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h2>Error</h2>
  <p>{{ error }}</p>
  <a href="/" class="btn">Volver</a>
</div>
</body>
</html>
